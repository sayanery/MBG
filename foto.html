<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SiKAPAN - Scan Makanan</title>
    <!-- Fonts and icons -->
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet" />
    <!-- Font Awesome Icons -->
    <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
    <!-- Main Styling -->
    <link href="./src/style.css" rel="stylesheet" />
</head>
<body class="m-0 font-sans text-base antialiased font-normal bg-gray-50 text-slate-700">
    <div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50 pb-28">
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-500 to-indigo-600 text-white py-6 px-4">
            <div class="max-w-6xl mx-auto flex items-center">
                <a href="./index.html" class="mr-4 text-white hover:text-blue-100 transition">
                    <i class="fas fa-arrow-left text-xl"></i>
                </a>
                <div>
                    <h1 class="text-2xl font-bold">Scan Makanan</h1>
                    <p class="text-blue-100 text-sm">Pilih foto atau input manual</p>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="max-w-6xl mx-auto px-4 py-6">
            <!-- Selection Options -->
            <div class="grid grid-cols-2 gap-4 mb-6">
                <!-- Option 1: Camera Scan -->
                <div class="bg-white rounded-2xl shadow-md p-6 cursor-pointer hover:shadow-lg transition-all transform hover:scale-105" onclick="showCameraModal()">
                    <div class="text-center">
                        <div class="bg-gradient-to-r from-blue-500 to-indigo-600 rounded-xl p-6 mb-4 flex items-center justify-center">
                            <i class="fas fa-camera text-4xl text-white"></i>
                        </div>
                        <h3 class="font-bold text-slate-800 mb-1">Ambil Foto</h3>
                        <p class="text-xs text-slate-600">Scan makanan dengan kamera</p>
                    </div>
                </div>

                <!-- Option 2: Manual Input -->
                <div class="bg-white rounded-2xl shadow-md p-6 cursor-pointer hover:shadow-lg transition-all transform hover:scale-105" onclick="showManualModal()">
                    <div class="text-center">
                        <div class="bg-gradient-to-r from-green-500 to-emerald-600 rounded-xl p-6 mb-4 flex items-center justify-center">
                            <i class="fas fa-pen text-4xl text-white"></i>
                        </div>
                        <h3 class="font-bold text-slate-800 mb-1">Input Manual</h3>
                        <p class="text-xs text-slate-600">Masukkan data makanan</p>
                    </div>
                </div>
            </div>

            <!-- Recent Scans -->
            <div class="bg-white rounded-2xl shadow-md p-6">
                <h3 class="text-lg font-bold text-slate-800 mb-4">Scan Terakhir</h3>
                <div id="recentScans" class="space-y-3">
                    <div class="text-center py-8">
                        <i class="fas fa-inbox text-4xl text-gray-300 mb-2"></i>
                        <p class="text-slate-500 text-sm">Belum ada scan</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Camera Modal -->
    <div id="cameraModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-40 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-lg max-w-2xl w-full p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-800">Ambil Foto Makanan</h2>
                <button onclick="closeCameraModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>

            <div class="mb-4">
                <video id="cameraStream" class="w-full bg-black rounded-lg" style="display: none;"></video>
                <canvas id="captureCanvas" class="w-full bg-gray-200 rounded-lg" style="display: none;"></canvas>
                <div id="capturePreview" class="w-full bg-gray-200 rounded-lg aspect-video flex items-center justify-center">
                    <div class="text-center">
                        <i class="fas fa-camera text-6xl text-gray-400 mb-2"></i>
                        <p class="text-slate-600">Kamera akan dimulai di sini</p>
                    </div>
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="startCamera()" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg font-semibold transition">
                    <i class="fas fa-play mr-2"></i>Mulai Kamera
                </button>
                <button onclick="capturePhoto()" class="flex-1 bg-green-500 hover:bg-green-600 text-white py-2 rounded-lg font-semibold transition">
                    <i class="fas fa-camera mr-2"></i>Ambil Foto
                </button>
                <button onclick="closeCameraModal()" class="flex-1 bg-gray-400 hover:bg-gray-500 text-white py-2 rounded-lg font-semibold transition">
                    Tutup
                </button>
            </div>

            <!-- Food Data Form -->
            <div id="foodFormContainer" class="hidden mt-6 pt-6 border-t">
                <h3 class="font-bold text-slate-800 mb-4">Data Makanan</h3>
                <div class="space-y-3">
                    <input type="text" placeholder="Nama Makanan" id="foodName" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-blue-500">
                    <input type="number" placeholder="Kalori" id="foodCalories" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-blue-500">
                    <input type="number" placeholder="Protein (g)" id="foodProtein" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-blue-500">
                    <input type="number" placeholder="Karbohidrat (g)" id="foodCarbs" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-blue-500">
                    <button onclick="saveFoodData('camera')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-lg font-semibold transition">
                        Simpan Makanan
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Manual Input Modal -->
    <div id="manualModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-40 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-lg max-w-2xl w-full p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-800">Input Data Makanan</h2>
                <button onclick="closeManualModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Nama Makanan</label>
                    <input type="text" placeholder="Contoh: Nasi Goreng" id="manualFoodName" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Kalori (kcal)</label>
                    <input type="number" placeholder="Contoh: 450" id="manualFoodCalories" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Protein (g)</label>
                    <input type="number" placeholder="Contoh: 12" id="manualFoodProtein" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Karbohidrat (g)</label>
                    <input type="number" placeholder="Contoh: 55" id="manualFoodCarbs" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-blue-500">
                </div>

                <div class="flex gap-3 pt-4">
                    <button onclick="saveFoodData('manual')" class="flex-1 bg-green-500 hover:bg-green-600 text-white py-3 rounded-lg font-semibold transition">
                        <i class="fas fa-check mr-2"></i>Simpan
                    </button>
                    <button onclick="closeManualModal()" class="flex-1 bg-gray-400 hover:bg-gray-500 text-white py-3 rounded-lg font-semibold transition">
                        Batal
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-50">
        <div class="flex justify-around items-center h-20">
            <!-- Home -->
            <a href="./index.html" class="flex flex-col items-center justify-center w-full h-full link-nav-mobile transition-colors">
                <i class="fas fa-home text-2xl text-gray-600 mb-1"></i>
                <span class="text-xs font-medium text-gray-600">Home</span>
            </a>

            <!-- Foto -->
            <a href="./foto.html" class="flex flex-col items-center justify-center w-full h-full link-nav-mobile active transition-colors">
                <i class="fas fa-image text-2xl text-gray-600 mb-1"></i>
                <span class="text-xs font-medium text-gray-600">Foto</span>
            </a>

            <!-- Profile -->
            <a href="./profile.html" class="flex flex-col items-center justify-center w-full h-full link-nav-mobile transition-colors">
                <i class="fas fa-user text-2xl text-gray-600 mb-1"></i>
                <span class="text-xs font-medium text-gray-600">Profile</span>
            </a>
        </div>
    </nav>

    <!-- Spacer -->
    <div class="h-20"></div>

    <script>
        let cameraStream = null;
        let photoData = null;

        function showCameraModal() {
            document.getElementById('cameraModal').classList.remove('hidden');
        }

        function closeCameraModal() {
            document.getElementById('cameraModal').classList.add('hidden');
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
        }

        function startCamera() {
            const video = document.getElementById('cameraStream');
            const preview = document.getElementById('capturePreview');
            
            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment' } 
            }).then(stream => {
                cameraStream = stream;
                video.srcObject = stream;
                video.style.display = 'block';
                preview.style.display = 'none';
                video.play();
            }).catch(err => {
                alert('Gagal mengakses kamera: ' + err.message);
            });
        }

        function capturePhoto() {
            const video = document.getElementById('cameraStream');
            const canvas = document.getElementById('captureCanvas');
            const ctx = canvas.getContext('2d');

            if (!cameraStream) {
                alert('Mulai kamera terlebih dahulu');
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            photoData = canvas.toDataURL('image/jpeg');
            canvas.style.display = 'block';
            video.style.display = 'none';
            
            document.getElementById('foodFormContainer').classList.remove('hidden');
        }

        function showManualModal() {
            document.getElementById('manualModal').classList.remove('hidden');
        }

        function closeManualModal() {
            document.getElementById('manualModal').classList.add('hidden');
            document.getElementById('manualFoodName').value = '';
            document.getElementById('manualFoodCalories').value = '';
            document.getElementById('manualFoodProtein').value = '';
            document.getElementById('manualFoodCarbs').value = '';
        }

        function saveFoodData(type) {
            let name, calories, protein, carbs;

            if (type === 'camera') {
                name = document.getElementById('foodName').value;
                calories = parseInt(document.getElementById('foodCalories').value) || 0;
                protein = parseInt(document.getElementById('foodProtein').value) || 0;
                carbs = parseInt(document.getElementById('foodCarbs').value) || 0;
            } else {
                name = document.getElementById('manualFoodName').value;
                calories = parseInt(document.getElementById('manualFoodCalories').value) || 0;
                protein = parseInt(document.getElementById('manualFoodProtein').value) || 0;
                carbs = parseInt(document.getElementById('manualFoodCarbs').value) || 0;
            }

            if (!name || calories === 0) {
                alert('Silakan isi semua data makanan');
                return;
            }

            const now = new Date();
            const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            
            const foodItem = {
                id: Date.now(),
                name: name,
                calories: calories,
                protein: protein,
                carbs: carbs,
                method: type === 'camera' ? 'Foto' : 'Manual',
                time: timeStr,
                date: now.toDateString(),
                timestamp: now.getTime(),
                photo: photoData || null
            };

            // Save to localStorage
            let history = JSON.parse(localStorage.getItem('scanHistory')) || [];
            history.unshift(foodItem);
            localStorage.setItem('scanHistory', JSON.stringify(history));

            alert('Makanan berhasil disimpan!');
            
            // Reset and close modals
            if (type === 'camera') {
                closeCameraModal();
                document.getElementById('foodName').value = '';
                document.getElementById('foodCalories').value = '';
                document.getElementById('foodProtein').value = '';
                document.getElementById('foodCarbs').value = '';
                photoData = null;
            } else {
                closeManualModal();
            }

            loadRecentScans();
        }

        function loadRecentScans() {
            const history = JSON.parse(localStorage.getItem('scanHistory')) || [];
            const container = document.getElementById('recentScans');

            if (history.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8">
                        <i class="fas fa-inbox text-4xl text-gray-300 mb-2"></i>
                        <p class="text-slate-500 text-sm">Belum ada scan</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = history.slice(0, 10).map(item => `
                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors">
                    <div>
                        <p class="font-semibold text-slate-800 text-sm">${item.name}</p>
                        <p class="text-xs text-slate-500">${item.time} • ${item.method}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-bold text-indigo-600">${item.calories} kcal</p>
                        <p class="text-xs text-slate-500">P: ${item.protein}g K: ${item.carbs}g</p>
                    </div>
                </div>
            `).join('');
        }

        // Initialize
        loadRecentScans();
    </script>
</body>
</html>
