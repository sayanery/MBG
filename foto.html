<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SiKAPAN - Scan Makanan</title>
    <!-- Fonts and icons -->
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet" />
    <!-- Font Awesome Icons -->
    <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
    <!-- Main Styling -->
    <link href="./src/style.css" rel="stylesheet" />
</head>
<body class="m-0 font-sans text-base antialiased font-normal bg-gray-50 text-slate-700 overflow-hidden">
    <!-- CAMERA/PHOTO SCAN PAGE -->
    <div id="cameraPage" class="relative w-full h-screen overflow-hidden">
        <!-- Background Image with Overlay -->
        <div class="absolute inset-0 bg-cover bg-center" style="background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1200 800%22><defs><linearGradient id=%22grad%22 x1=%220%25%22 y1=%220%25%22 x2=%22100%25%22 y2=%22100%25%22><stop offset=%220%25%22 style=%22stop-color:#FF8C42;stop-opacity:1%22/><stop offset=%22100%25%22 style=%22stop-color:#FFB84D;stop-opacity:1%22></linearGradient></defs><rect width=%221200%22 height=%22800%22 fill=%22url(%23grad)%22/><circle cx=%22600%22 cy=%22300%22 r=%22150%22 fill=%22%23FFF%22 opacity=%220.1%22/><rect x=%22200%22 y=%22400%22 width=%22800%22 height=%22300%22 fill=%22%23D2691E%22 rx=%2220%22/></svg>');">
        </div>

        <!-- Logo at top center -->
        <div class="absolute top-8 left-1/2 transform -translate-x-1/2 z-20">
            <div class="bg-white rounded-full w-14 h-14 flex items-center justify-center shadow-lg">
                <i class="fas fa-utensils text-2xl text-indigo-600"></i>
            </div>
        </div>

        <!-- Scanner Frame Overlay -->
        <div class="absolute inset-0 flex items-center justify-center z-10">
            <div class="relative w-64 h-80 border-4 border-white rounded-3xl shadow-2xl" style="box-shadow: 0 0 40px rgba(255, 255, 255, 0.3), inset 0 0 30px rgba(0, 0, 0, 0.1);">
                <!-- Corner indicators -->
                <div class="absolute top-3 left-3 w-8 h-8 border-t-4 border-l-4 border-white rounded-tl-xl"></div>
                <div class="absolute top-3 right-3 w-8 h-8 border-t-4 border-r-4 border-white rounded-tr-xl"></div>
                <div class="absolute bottom-3 left-3 w-8 h-8 border-b-4 border-l-4 border-white rounded-bl-xl"></div>
                <div class="absolute bottom-3 right-3 w-8 h-8 border-b-4 border-r-4 border-white rounded-br-xl"></div>
                
                <!-- Scanning line animation -->
                <div class="absolute inset-4 rounded-2xl overflow-hidden">
                    <div class="animate-pulse absolute inset-0 bg-gradient-to-b from-white via-transparent to-transparent opacity-30"></div>
                </div>
            </div>
        </div>

        <!-- Toggle Buttons at bottom -->
        <div class="absolute bottom-24 left-1/2 transform -translate-x-1/2 z-20 flex gap-4 bg-white rounded-full px-2 py-2 shadow-xl">
            <!-- Photo Button (Active) -->
            <button onclick="switchToCamera()" class="toggle-btn-photo active bg-white text-indigo-600 px-8 py-2 rounded-full font-semibold transition-all duration-300 shadow-md hover:shadow-lg">
                <i class="fas fa-camera mr-2"></i>Photo
            </button>
            
            <!-- Manual Button (Inactive) -->
            <button onclick="switchToManual()" class="toggle-btn-manual bg-gray-200 text-gray-600 px-8 py-2 rounded-full font-semibold transition-all duration-300 hover:bg-gray-300">
                <i class="fas fa-pen mr-2"></i>Manual
            </button>
        </div>

        <!-- Action Button -->
        <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 z-20">
            <button class="bg-white rounded-full w-20 h-20 flex items-center justify-center shadow-2xl hover:shadow-3xl transition-all transform hover:scale-110 active:scale-95" onclick="capturePhoto()">
                <div class="w-16 h-16 bg-gradient-to-r from-indigo-500 to-blue-500 rounded-full flex items-center justify-center">
                    <i class="fas fa-camera text-white text-2xl"></i>
                </div>
            </button>
        </div>

        <!-- Back button -->
        <a href="./index.html" class="absolute top-8 left-8 z-20 bg-white bg-opacity-90 rounded-full w-12 h-12 flex items-center justify-center shadow-lg hover:shadow-xl transition-all hover:bg-opacity-100">
            <i class="fas fa-arrow-left text-xl text-gray-700"></i>
        </a>
    </div>

    <!-- MANUAL INPUT PAGE (HIDDEN) -->
    <div id="manualPage" class="hidden min-h-screen pb-28" style="background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #c0c0c0 100%);">
        <!-- Top Logo -->
        <div class="pt-8 flex justify-center">
            <div class="bg-white rounded-full w-14 h-14 flex items-center justify-center shadow-lg">
                <i class="fas fa-utensils text-2xl text-indigo-600"></i>
            </div>
        </div>

        <!-- Main Content -->
        <div class="max-w-3xl mx-auto px-4 py-6">
            <!-- Title -->
            <h1 class="text-white text-2xl font-bold text-center mb-8">Input Makanan Manual</h1>

            <!-- Meal Cards -->
            <div class="space-y-4 mb-8">
                <!-- Card 1 -->
                <div class="bg-white rounded-3xl shadow-lg p-6 transform hover:scale-102 transition-transform">
                    <div class="flex items-start gap-4">
                        <div class="bg-gradient-to-br from-orange-400 to-orange-500 rounded-2xl w-16 h-16 flex items-center justify-center flex-shrink-0 shadow-md">
                            <i class="fas fa-bowl-rice text-white text-2xl"></i>
                        </div>
                        <div class="flex-1">
                            <p class="text-slate-800 text-sm leading-relaxed">
                                <span class="font-bold">Sarapan</span> saya makan <span class="text-indigo-600 font-semibold">Soto Sapi</span> dengan <span class="text-indigo-600 font-semibold">Mendoan 1 biji</span>
                            </p>
                            <p class="text-xs text-slate-500 mt-2">Kalori: ~350 kcal • Protein: 15g</p>
                        </div>
                        <button class="text-red-400 hover:text-red-600 transition text-lg">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="bg-white rounded-3xl shadow-lg p-6 transform hover:scale-102 transition-transform">
                    <div class="flex items-start gap-4">
                        <div class="bg-gradient-to-br from-green-400 to-green-500 rounded-2xl w-16 h-16 flex items-center justify-center flex-shrink-0 shadow-md">
                            <i class="fas fa-leaf text-white text-2xl"></i>
                        </div>
                        <div class="flex-1">
                            <p class="text-slate-800 text-sm leading-relaxed">
                                <span class="font-bold">Cemilan Sore</span> saya makan <span class="text-indigo-600 font-semibold">Salad Buah</span> dengan <span class="text-indigo-600 font-semibold">Kacang Mede 500 Gram</span>
                            </p>
                            <p class="text-xs text-slate-500 mt-2">Kalori: ~280 kcal • Protein: 8g</p>
                        </div>
                        <button class="text-red-400 hover:text-red-600 transition text-lg">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Input Field with Icons -->
            <div class="bg-white rounded-3xl shadow-2xl p-5 flex items-center gap-3">
                <!-- Input Field -->
                <input type="text" id="foodInput" placeholder="Makan apa hari ini?" class="flex-1 bg-transparent outline-none text-slate-800 placeholder-gray-400 font-medium">
                
                <!-- Upload Icon Button -->
                <button class="p-3 hover:bg-gray-100 rounded-full transition text-gray-600 hover:text-indigo-600">
                    <i class="fas fa-image text-xl"></i>
                </button>
                
                <!-- Send Icon Button -->
                <button onclick="addFoodManual()" class="p-3 bg-gradient-to-r from-indigo-500 to-blue-500 rounded-full transition text-white hover:shadow-lg active:scale-95">
                    <i class="fas fa-paper-plane text-xl"></i>
                </button>
            </div>
        </div>

        <!-- Back Button (Top Left) -->
        <a href="./index.html" class="fixed top-8 left-8 z-20 bg-white bg-opacity-90 rounded-full w-12 h-12 flex items-center justify-center shadow-lg hover:shadow-xl transition-all hover:bg-opacity-100">
            <i class="fas fa-arrow-left text-xl text-gray-700"></i>
        </a>
    </div>

    <!-- Mobile Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white z-50 border-t-4 border-indigo-600 shadow-2xl">
        <div class="flex justify-center items-center gap-8 h-28 px-4">
            <!-- Home -->
            <a href="./index.html" class="flex flex-col items-center justify-center text-gray-600 hover:text-indigo-600 transition-colors p-4 rounded-3xl hover:bg-gray-50" title="Home">
                <i class="fas fa-home text-5xl"></i>
            </a>

            <!-- Foto -->
            <a href="./foto.html" class="flex flex-col items-center justify-center text-indigo-600 bg-indigo-50 p-4 rounded-3xl transition-colors hover:shadow-lg hover:bg-indigo-100" title="Foto">
                <i class="fas fa-camera text-5xl"></i>
            </a>

            <!-- Profile -->
            <a href="./profile.html" class="flex flex-col items-center justify-center text-gray-600 hover:text-indigo-600 transition-colors p-4 rounded-3xl hover:bg-gray-50" title="Profile">
                <i class="fas fa-user text-5xl"></i>
            </a>
        </div>
    </nav>

    <script>
        // Switch to Manual Input Page
        function switchToManual() {
            document.getElementById('cameraPage').classList.add('hidden');
            document.getElementById('manualPage').classList.remove('hidden');
        }

        // Switch to Camera Page
        function switchToCamera() {
            document.getElementById('cameraPage').classList.remove('hidden');
            document.getElementById('manualPage').classList.add('hidden');
        }

        // Capture Photo Function
        function capturePhoto() {
            alert('Foto berhasil diambil! Fitur kamera sedang dalam tahap pengembangan.');
            const foodData = {
                name: 'Makanan yang discan',
                time: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }),
                calories: '~250 kcal',
                method: 'Photo Scan'
            };
            
            let history = JSON.parse(localStorage.getItem('scanHistory')) || [];
            history.unshift(foodData);
            localStorage.setItem('scanHistory', JSON.stringify(history.slice(0, 10)));
        }

        // Add Food Manual Function
        function addFoodManual() {
            const input = document.getElementById('foodInput').value;
            if (input.trim()) {
                alert('Makanan "' + input + '" berhasil ditambahkan!');
                
                const foodData = {
                    name: input,
                    time: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }),
                    calories: '~300 kcal',
                    method: 'Manual Input'
                };
                
                let history = JSON.parse(localStorage.getItem('scanHistory')) || [];
                history.unshift(foodData);
                localStorage.setItem('scanHistory', JSON.stringify(history.slice(0, 10)));
                
                document.getElementById('foodInput').value = '';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const foodInput = document.getElementById('foodInput');
            if (foodInput) {
                foodInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        addFoodManual();
                    }
                });
            }
        });
    </script>
</body>
</html>
