<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SiKAPAN - Tracking Makanan</title>
    <!-- Fonts and icons -->
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet" />
    <!-- Font Awesome Icons -->
    <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
    <!-- Main Styling -->
    <link href="./src/style.css" rel="stylesheet" />
</head>
<body class="m-0 font-sans text-base antialiased font-normal bg-gray-50 text-slate-700">
    <div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50 pb-40">
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-500 to-indigo-600 text-white py-6 px-4">
            <div class="max-w-6xl mx-auto">
                <h1 class="text-2xl font-bold">MBG</h1>
                <p class="text-blue-100 text-sm">Sistem Kalori & Panduan Nutrisi</p>
            </div>
        </div>

        <!-- Main Content -->
        <div class="max-w-6xl mx-auto px-4 py-6">
            <!-- Welcome Section -->
            <div class="bg-white rounded-2xl shadow-md p-6 mb-6">
                <h2 class="text-xl font-bold text-slate-800 mb-2">Halo, Selamat Datang!</h2>
                <p class="text-slate-600 text-sm">Mulai tracking makananmu dan pantau kalori harian</p>
            </div>

            <!-- Today's Card Tracking -->
            <div class="bg-white rounded-2xl shadow-md p-6 mb-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold text-slate-800">Tracking Hari Ini</h3>
                    <span class="text-sm text-slate-500" id="todayDate">17 Apr 2026</span>
                </div>
                
                <div class="space-y-4">
                    <!-- Calorie Progress -->
                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="text-sm font-semibold text-slate-700">Kalori Harian</span>
                            <span class="text-sm font-bold text-indigo-600" id="calorieCount">0/2000 kcal</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-3">
                            <div class="bg-gradient-to-r from-blue-500 to-indigo-600 h-3 rounded-full w-0 transition-all duration-300" id="calorieBar" style="width: 0%"></div>
                        </div>
                    </div>

                    <!-- Protein Progress -->
                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="text-sm font-semibold text-slate-700">Protein</span>
                            <span class="text-sm font-bold text-green-600" id="proteinCount">0/50 g</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-3">
                            <div class="bg-gradient-to-r from-green-500 to-emerald-600 h-3 rounded-full w-0 transition-all duration-300" id="proteinBar" style="width: 0%"></div>
                        </div>
                    </div>

                    <!-- Carbs Progress -->
                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="text-sm font-semibold text-slate-700">Karbohidrat</span>
                            <span class="text-sm font-bold text-orange-600" id="carbsCount">0/250 g</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-3">
                            <div class="bg-gradient-to-r from-orange-500 to-amber-600 h-3 rounded-full w-0 transition-all duration-300" id="carbsBar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <button onclick="window.location.href='./foto.html'" class="w-full mt-6 bg-gradient-to-r from-blue-500 to-indigo-600 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-shadow">
                    <i class="fas fa-camera mr-2"></i>Tambah Makanan
                </button>
            </div>

            <!-- Riwayat Scan Section -->
            <div class="bg-white rounded-2xl shadow-md p-6">
                <h3 class="text-lg font-bold text-slate-800 mb-4">Riwayat Scan</h3>
                
                <div id="scanHistory" class="space-y-3">
                    <!-- History items will be loaded here -->
                    <div class="text-center py-8">
                        <i class="fas fa-history text-4xl text-gray-300 mb-2"></i>
                        <p class="text-slate-500 text-sm">Belum ada riwayat scan</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white z-50 border-t-4 border-indigo-600 shadow-2xl">
        <div class="flex justify-center items-center gap-8 h-28 px-4">
            <!-- Home -->
            <a href="./index.html" class="flex flex-col items-center justify-center text-indigo-600 bg-indigo-50 p-4 rounded-3xl transition-colors hover:shadow-lg hover:bg-indigo-100" title="Home">
                <i class="fas fa-home text-5xl"></i>
            </a>

            <!-- Foto -->
            <a href="./foto.html" class="flex flex-col items-center justify-center text-gray-600 hover:text-indigo-600 transition-colors p-4 rounded-3xl hover:bg-gray-50" title="Foto">
                <i class="fas fa-camera text-5xl"></i>
            </a>

            <!-- Profile -->
            <a href="./profile.html" class="flex flex-col items-center justify-center text-gray-600 hover:text-indigo-600 transition-colors p-4 rounded-3xl hover:bg-gray-50" title="Profile">
                <i class="fas fa-user text-5xl"></i>
            </a>
        </div>
    </nav>

    <script>
        // Set today's date
        const options = { year: 'numeric', month: 'short', day: 'numeric' };
        const today = new Date().toLocaleDateString('id-ID', options);
        document.getElementById('todayDate').textContent = today;

        // Load scan history from localStorage
        function loadScanHistory() {
            const history = JSON.parse(localStorage.getItem('scanHistory')) || [];
            const historyContainer = document.getElementById('scanHistory');
            
            if (history.length === 0) {
                historyContainer.innerHTML = `
                    <div class="text-center py-8">
                        <i class="fas fa-history text-4xl text-gray-300 mb-2"></i>
                        <p class="text-slate-500 text-sm">Belum ada riwayat scan</p>
                    </div>
                `;
                return;
            }

            historyContainer.innerHTML = history.slice(0, 5).map(item => `
                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors">
                    <div>
                        <p class="font-semibold text-slate-800 text-sm">${item.name}</p>
                        <p class="text-xs text-slate-500">${item.time} • ${item.calories} kcal</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs font-semibold text-indigo-600">${item.method}</p>
                    </div>
                </div>
            `).join('');
        }

        // Update nutrition summary
        function updateNutritionSummary() {
            const history = JSON.parse(localStorage.getItem('scanHistory')) || [];
            const today = new Date().toDateString();
            
            let totalCalories = 0;
            let totalProtein = 0;
            let totalCarbs = 0;

            history.forEach(item => {
                if (new Date(item.date).toDateString() === today) {
                    totalCalories += item.calories || 0;
                    totalProtein += item.protein || 0;
                    totalCarbs += item.carbs || 0;
                }
            });

            document.getElementById('calorieCount').textContent = `${totalCalories}/2000 kcal`;
            document.getElementById('proteinCount').textContent = `${totalProtein}/50 g`;
            document.getElementById('carbsCount').textContent = `${totalCarbs}/250 g`;

            document.getElementById('calorieBar').style.width = Math.min((totalCalories / 2000) * 100, 100) + '%';
            document.getElementById('proteinBar').style.width = Math.min((totalProtein / 50) * 100, 100) + '%';
            document.getElementById('carbsBar').style.width = Math.min((totalCarbs / 250) * 100, 100) + '%';
        }

        // Update active navigation
        function updateActiveNav() {
            document.querySelectorAll('.link-nav-mobile').forEach(link => {
                link.classList.remove('active');
            });
            document.querySelector('.link-nav-mobile[href="./index.html"]').classList.add('active');
        }

        // Initialize
        loadScanHistory();
        updateNutritionSummary();
        updateActiveNav();

        // Refresh every 30 seconds
        setInterval(() => {
            loadScanHistory();
            updateNutritionSummary();
        }, 30000);
    </script>
</body>
</html>
