<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>NutriTrack – Scan Makanan</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #eef1fb;
      --blue-main: #6b7fe8;
      --blue-dark: #4a5fc4;
      --blue-light: #c4cbf5;
      --blue-pale: #dde2f8;
      --white: #ffffff;
      --text-dark: #1e2240;
      --text-mid: #4a4f72;
      --text-light: #8b90b8;
      --orange: #f47c3c;
      --card-shadow: 0 4px 20px rgba(107,127,232,0.13);
    }

    html, body { height: 100%; background: #d0d6f0; font-family: 'Nunito', sans-serif; }

    .phone {
      width: 390px;
      min-height: 844px;
      margin: 32px auto;
      background: var(--bg);
      border-radius: 48px;
      box-shadow: 0 24px 80px rgba(74,95,196,0.28), 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    #page-photo {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      transition: opacity .3s, transform .3s;
    }
    #page-photo.hidden { opacity: 0; pointer-events: none; transform: scale(.98); }

    .camera-bg {
      position: absolute; inset: 0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,.35) 0%, transparent 30%, transparent 70%, rgba(0,0,0,.4) 100%),
        url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=800&q=80') center/cover no-repeat;
    }

    .cam-logo {
      position: absolute; top: 46px; left: 50%; transform: translateX(-50%);
      width: 52px; height: 52px;
      background: white; border-radius: 50%;
      display: grid; place-items: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.2);
      z-index: 10;
    }
    .cam-logo svg { width: 32px; height: 32px; }

    .scan-frame {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -55%);
      width: 260px; height: 300px;
    }
    .scan-frame::before, .scan-frame::after,
    .scan-frame .corner-br, .scan-frame .corner-bl {
      content: '';
      position: absolute;
      width: 48px; height: 48px;
      border-color: white;
      border-style: solid;
    }
    .scan-frame::before { top: 0; left: 0; border-width: 4px 0 0 4px; border-radius: 8px 0 0 0; }
    .scan-frame::after  { top: 0; right: 0; border-width: 4px 4px 0 0; border-radius: 0 8px 0 0; }
    .scan-frame .corner-br { bottom: 0; right: 0; border-width: 0 4px 4px 0; border-radius: 0 0 8px 0; }
    .scan-frame .corner-bl { bottom: 0; left: 0;  border-width: 0 0 4px 4px; border-radius: 0 0 0 8px; }

    .scan-line {
      position: absolute;
      left: 8px; right: 8px; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.9), transparent);
      animation: scanMove 2.5s ease-in-out infinite;
      top: 10%;
    }
    @keyframes scanMove {
      0%, 100% { top: 10%; }
      50%       { top: 85%; }
    }

    .cam-tabs {
      position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
      display: flex;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(12px);
      border-radius: 50px;
      padding: 5px;
      gap: 4px;
      box-shadow: 0 8px 32px rgba(0,0,0,.2);
      z-index: 10;
    }
    .tab-pill {
      padding: 10px 32px;
      border-radius: 50px;
      border: none; cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 800;
      transition: all .25s;
      background: transparent;
      color: var(--text-mid);
    }
    .tab-pill.active {
      background: var(--white);
      color: var(--text-dark);
      box-shadow: 0 2px 10px rgba(0,0,0,.12);
    }

    #page-manual {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      background: linear-gradient(160deg, var(--blue-dark) 0%, var(--blue-main) 45%, var(--blue-pale) 100%);
      transition: opacity .3s, transform .3s;
      padding-bottom: 76px;
    }
    #page-manual.hidden { opacity: 0; pointer-events: none; transform: scale(.98); }

    .chat-header {
      display: flex; align-items: center; justify-content: center;
      padding: 52px 20px 16px;
      position: relative;
    }
    .back-btn {
      position: absolute; left: 20px; top: 50px;
      width: 38px; height: 38px;
      background: rgba(255,255,255,.2);
      border: none; border-radius: 50%;
      cursor: pointer; display: grid; place-items: center;
      transition: background .2s;
    }
    .back-btn:hover { background: rgba(255,255,255,.3); }
    .back-btn svg { width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; }

    .chat-logo {
      width: 52px; height: 52px;
      background: white; border-radius: 50%;
      display: grid; place-items: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.15);
    }
    .chat-logo svg { width: 32px; height: 32px; }

    .messages {
      flex: 1; overflow-y: auto; padding: 10px 16px 20px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .messages::-webkit-scrollbar { display: none; }

    .bubble-user-text {
      background: #ffffff;
      border-radius: 16px;
      padding: 16px 20px;
      width: 100%;
      text-align: center;
      font-size: 13.5px; line-height: 1.5;
      color: var(--text-dark);
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      animation: popIn .3s ease both;
    }

    .bubble-user-img {
      background: #ffffff;
      border-radius: 16px 16px 4px 16px;
      padding: 12px;
      max-width: 65%;
      align-self: flex-end;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      animation: popIn .3s ease both;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .bubble-user-img img {
      width: 100%;
      border-radius: 10px;
      object-fit: cover;
    }
    .bubble-user-img .text {
      font-size: 12px;
      color: var(--text-dark);
    }

    .bubble-bot-reply {
      background: #ffffff;
      border-radius: 16px 16px 16px 4px;
      padding: 12px;
      max-width: 70%;
      align-self: flex-start;
      box-shadow: 0 2px 14px rgba(0,0,0,.1);
      animation: popIn .35s ease .1s both;
      display: flex;
      flex-direction: column;
    }
    .bubble-bot-reply img {
      width: 100%;
      border-radius: 10px;
      object-fit: cover;
      margin-bottom: 12px;
    }
    .bubble-bot-reply .text {
      font-size: 12.5px;
      color: var(--text-dark);
      line-height: 1.4;
      margin-bottom: 12px;
    }
    .bubble-bot-reply .link {
      border-top: 1px solid rgba(0,0,0,.08);
      padding-top: 10px;
      text-align: center;
    }
    .bubble-bot-reply .link a {
      color: var(--blue-main);
      text-decoration: none;
      font-size: 13px;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(.92) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .chat-input-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px 24px;
      background: transparent;
    }
    .chat-input-wrap {
      flex: 1;
      background: var(--white);
      border-radius: 50px;
      display: flex;
      align-items: center;
      padding: 4px 18px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .chat-input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 10px 0;
      font-family: 'Nunito', sans-serif;
      font-size: 13.5px; color: var(--text-dark);
      outline: none;
    }
    .chat-input::placeholder { color: var(--text-light); }
    
    .input-icon-btn {
      width: 36px; height: 36px;
      background: var(--white);
      border: none; border-radius: 50%;
      cursor: pointer; display: grid; place-items: center;
      transition: background .2s, transform .15s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      flex-shrink: 0;
    }
    .input-icon-btn:hover { transform: scale(1.05); }
    .input-icon-btn svg { width: 18px; height: 18px; }
    
    .chat-input-wrap .photo-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px;
    }
    .chat-input-wrap .photo-btn svg {
      width: 20px; height: 20px;
    }

    .bottom-nav {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 76px;
      background: var(--white);
      border-radius: 0 0 48px 48px;
      display: flex;
      align-items: center; justify-content: space-around;
      box-shadow: 0 -4px 24px rgba(74,95,196,0.12);
      padding: 0 20px;
      z-index: 30;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px; cursor: pointer; padding: 8px;
      border-radius: 16px; transition: background .2s;
      border: none; background: transparent;
    }
    .nav-item:hover { background: var(--blue-pale); }
    .nav-item svg { width: 24px; height: 24px; fill: var(--text-light); }
    .nav-item.active svg { fill: var(--blue-main); }
    .nav-dot { width: 6px; height: 6px; background: var(--blue-main); border-radius: 50%; }
    .nav-item:not(.active) .nav-dot { display: none; }

    .nav-center {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--blue-main), var(--blue-dark));
      border-radius: 50%;
      border: none; cursor: pointer;
      display: grid; place-items: center;
      box-shadow: 0 4px 16px rgba(107,127,232,.4);
      transition: transform .2s, box-shadow .2s;
    }
    .nav-center:hover { transform: scale(1.1); box-shadow: 0 6px 22px rgba(107,127,232,.5); }
    .nav-center svg { width: 26px; height: 26px; fill: white; }

    @media (max-width: 420px) {
      .phone { width: 100%; border-radius: 0; margin: 0; min-height: 100dvh; }
    }
  </style>
</head>
<body>

<div class="phone">

  <div id="page-photo">

    <div class="camera-bg"></div>

    <div class="cam-logo">
      <svg viewBox="0 0 32 32" fill="none">
        <path d="M16 28C16 28 7 21 7 13C7 8.58 11.13 5 16 5C20.87 5 25 8.58 25 13C25 21 16 28 16 28Z" fill="#6b7fe8" opacity=".3"/>
        <path d="M16 28C16 28 7 21 7 13C7 8.58 11.13 5 16 5" stroke="#4a5fc4" stroke-width="2" stroke-linecap="round" fill="none"/>
        <line x1="16" y1="28" x2="16" y2="15" stroke="#4a5fc4" stroke-width="2" stroke-linecap="round"/>
        <circle cx="16" cy="12" r="2.5" fill="#6b7fe8"/>
      </svg>
    </div>

    <div class="scan-frame">
      <div class="corner-br"></div>
      <div class="corner-bl"></div>
      <div class="scan-line"></div>
    </div>

    <div class="cam-tabs">
      <button class="tab-pill active" onclick="switchTab('photo')">Photo</button>
      <button class="tab-pill" onclick="switchTab('manual')">Manual</button>
    </div>

  </div>

  <div id="page-manual" class="hidden">

    <div class="chat-header">
      <button class="back-btn" onclick="switchTab('photo')" aria-label="Kembali">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="chat-logo">
        <svg viewBox="0 0 32 32" fill="none">
          <path d="M16 28C16 28 7 21 7 13C7 8.58 11.13 5 16 5C20.87 5 25 8.58 25 13C25 21 16 28 16 28Z" fill="#6b7fe8" opacity=".3"/>
          <path d="M16 28C16 28 7 21 7 13C7 8.58 11.13 5 16 5" stroke="#4a5fc4" stroke-width="2" stroke-linecap="round" fill="none"/>
          <line x1="16" y1="28" x2="16" y2="15" stroke="#4a5fc4" stroke-width="2" stroke-linecap="round"/>
          <circle cx="16" cy="12" r="2.5" fill="#6b7fe8"/>
        </svg>
      </div>
    </div>

    <div class="messages" id="chat-messages">

      <div class="bubble-user-text">
        Sarapan saya makan <b>Soto sapi</b> dengan <b>Mendoan 1 biji</b>
      </div>

      <div class="bubble-user-text">
        Cemilan sore saya makan <b>Salad Buah</b> dengan <b>Kacang Mede 500 Gram</b>
      </div>

      <div class="bubble-user-img">
        <img src="https://images.unsplash.com/photo-1512058564366-18510be2db19?w=400&q=80" alt="Nasi goreng"/>
        <div class="text">Sarapan hari ini saya menggunakan ini</div>
      </div>

      <div class="bubble-bot-reply">
        <img src="https://images.unsplash.com/photo-1512058564366-18510be2db19?w=400&q=80" alt="Nasi goreng"/>
        <div class="text">
          Wah kelihatannya <b>Nasi Goreng dan telur goreng nya</b> sangat enak!<br>
          Mari kita lihat kandungan gizi didalam makanan kamu ya
        </div>
        <div class="link">
          <a href="#">Lihat Gizi</a>
        </div>
      </div>

    </div>

    <div class="chat-input-bar">
      <div class="chat-input-wrap">
        <input class="chat-input" type="text" placeholder="Makan apa hari ini?" id="chat-input-field"/>
        <button class="photo-btn" title="Kirim foto" onclick="handleImageBtn()">
          <svg viewBox="0 0 24 24" fill="none" stroke="#6b7fe8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </button>
      </div>
      <button class="input-icon-btn" title="Kirim pesan" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#6b7fe8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

  </div>

    <nav class="bottom-nav">
    <button class="nav-item" onclick="window.location.href='index.html'" aria-label="Beranda">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/></svg>
    </button>
    
    <button class="nav-center active" aria-label="Scan makanan">
      <svg viewBox="0 0 24 24"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/><circle cx="12" cy="12" r="3" fill="white"/></svg>
    </button>
    
    <button class="nav-item" onclick="window.location.href='profile.html'" aria-label="Profil">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.58-7 8-7s8 3 8 7"/></svg>
    </button>
  </nav>
</div>

<script>
  let currentTab = 'photo'; 

  function switchTab(tab) {
    currentTab = tab;
    const photo  = document.getElementById('page-photo');
    const manual = document.getElementById('page-manual');
    if (tab === 'photo') {
      photo.classList.remove('hidden');
      manual.classList.add('hidden');
    } else {
      manual.classList.remove('hidden');
      photo.classList.add('hidden');
      const msgs = document.getElementById('chat-messages');
      setTimeout(() => msgs.scrollTop = msgs.scrollHeight, 100);
    }
  }

  document.querySelectorAll('.tab-pill').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.tab-pill').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
    });
  });

  function toggleScanPage() {
    if (currentTab !== 'photo') switchTab('photo');
  }

  function sendMessage() {
    const input = document.getElementById('chat-input-field');
    const text = input.value.trim();
    if (!text) return;

    const msgs = document.getElementById('chat-messages');

    const userBubble = document.createElement('div');
    userBubble.className = 'bubble-user-text';
    userBubble.innerHTML = text;
    msgs.appendChild(userBubble);
    input.value = '';

    const typing = document.createElement('div');
    typing.className = 'bubble-bot-reply';
    typing.innerHTML = '<div class="text" style="margin-bottom:0;">💬 Sedang menghitung gizi...</div>';
    msgs.appendChild(typing);
    msgs.scrollTop = msgs.scrollHeight;

    setTimeout(() => {
      typing.remove();
      const botBubble = document.createElement('div');
      botBubble.className = 'bubble-bot-reply';
      botBubble.innerHTML = `
        <div class="text">
          Saya mencatat bahwa kamu makan <b>${text}</b>.<br>
          Kandungan gizi sedang dianalisis ya! 🥗
        </div>
        <div class="link"><a href="#">Lihat Gizi</a></div>
      `;
      msgs.appendChild(botBubble);
      msgs.scrollTop = msgs.scrollHeight;
    }, 1200);
  }

  function handleImageBtn() {
    alert('Fitur upload foto: pilih gambar dari galeri mu!');
  }

  document.getElementById('chat-input-field').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });
</script>

</body>
</html>
